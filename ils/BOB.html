<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="../css/style.css">
        <style>
            tr[data-href] {
                cursor: pointer;
            }

            tr[data-href]:hover {
                background-color: rgba(150, 150, 150, 0.1);
            }
        </style>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const rows = document.querySelectorAll("tr[data-href]");

                rows.forEach(row => {
                    row.addEventListener("click", () => {
                        window.location.href = row.dataset.href;
                    })
                })
            });
        </script>
    </head>
    <body>
        <header>
            <h1>Chiara's Speedrunning Website</h1>
        </header>
        <main>
            <div class="gameBox">
                <div class="gameBoxInside">
                    <div class="gameBoxInfo">
                        <div class="gameLogo">
                            <a href="../index.html"><img src="../images/logo.webp" alt="logo" width="80rem" style="border-radius: 0.5rem;"></a>
                        </div>
                        <div class="gameInfo">
                            <a href="../index.html"><h2>Super Mario 64 (Mobile)</h2></a>
                            <strong>Super Mario Series</strong>
                            <a href="../ce.html" class="gamePlatform">Category Extensions</a>
                        </div>
                    </div>
                    <div class="gameBoxInfo">
                        <div class="gameMods">
                            <h3 style="text-align: left;">Leaderboard</h3>
                            <div class="player">
                                <img src="../images/awbryy pfp64.png" alt="pfp" style="border-radius: 50%;" width="20%"><strong class="playerColor awbryy"> awbryy</strong><br>
                            </div>
                            <div class="player">
                                <img src="../images/major pfp64.png" alt="pfp" style="border-radius: 50%;" width="20%"><strong class="playerColor major1"> Ma</strong><strong class="playerColor major2">jor</strong><br>
                            </div>
                        </div>
                        <div class="gameMods">
                            <h3 style="text-align: left;">Moderators</h3>
                            <div class="player">
                                <img src="../images/chillo pfp64.png" alt="pfp" style="border-radius: 50%;" width="11%"><strong class="playerColor chillo1"> Ch</strong><strong class="playerColor chillo2">illo</strong><br>
                            </div>
                            <div class="player">
                                <img src="../images/mercury pfp64.png" alt="pfp" style="border-radius: 50%;" width="11%"><strong class="playerColor mercury"> MercurySpeedruns</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="gameBox2">
                <div class="optionBox">
                    <a href="../index.html" class="category">Full Game</a>
                    <a href="BOB.html" class="category" style="background-color: rgba(0, 110, 255, 0.9);">Level</a>
                </div>
                <div class="categoryBox">
                    <a href="BOB.html" class="category" style="background-color: rgba(0, 110, 255, 0.9);">BOB</a>
                </div>
                <div class="leaderboardBox">
                    <table>
                        <tr>
                            <th>#</th>
                            <th style="text-align: left;">Player</th>
                            <th>Time</th>
                            <th>Date</th>
                            <th>Verified</th>
                        </tr>
                    </table>
                </div>
            </div>
        </main>
        <footer>
            <p>Join the SM64 Mobile Speedruning <a href="https://discord.gg/28sytjXMxK"><strong style="color: rgb(84, 134, 209);">Discord Server</strong></a> here</p>
        </footer>
    </body>
</html>
